name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Create distribution ZIP
        run: |
          cd dist
          zip -r ../ContextDrop-${{ github.ref_name }}.zip .
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: ContextDrop ${{ github.ref_name }}
          body: |
            ## ContextDrop ${{ github.ref_name }}

            ### 安装方法
            1. 下载 `ContextDrop-${{ github.ref_name }}.zip`
            2. 解压到任意目录
            3. 打开 Chrome，访问 `chrome://extensions/`
            4. 开启右上角的「开发者模式」
            5. 点击「加载已解压的扩展程序」
            6. 选择解压后的文件夹

            ### 更新日志
            请查看 [commits](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) 了解变更详情。
          files: |
            ContextDrop-${{ github.ref_name }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
